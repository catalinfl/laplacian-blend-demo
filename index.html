<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Laplacian Pyramid Blending</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <!-- Hidden source images -->
    <img id="imgApple"  src="./src/assets/apple.png"  style="display:none" />
    <img id="imgOrange" src="./src/assets/orange.png" style="display:none" />

    <div id="app">
      <p class="subtitle">
        Comparation: direct cut vs. blending smooth with laplacian pyramids
      </p>

      <div id="controls">
        <label>
          Pyramid levels:
          <input type="range" id="levels" min="1" max="20" value="6" />
          <span id="levelsVal">6</span>
        </label>
      </div>

      <div id="grid">
        <div class="cell">
          <h2>Apple</h2>
          <canvas id="canvasApple"></canvas>
        </div>
        <div class="cell">
          <h2>Orange</h2>
          <canvas id="canvasOrange"></canvas>
        </div>
        <div class="cell">
          <h2>Direct Connection</h2>
          <canvas id="canvasDirect"></canvas>
        </div>
        <div class="cell">
          <h2>Pyramid Blending</h2>
          <canvas id="canvasPyramid"></canvas>
        </div>
      </div>

      <div id="status">Load opencv…</div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
